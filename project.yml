name: YingQi
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.9
packages:
  WechatOpenSDK:
    url: https://github.com/yanyin1986/WechatOpenSDK.git
    from: 2.0.7
targets:
  YingQi:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Features
      - path: Models
      - path: Support
      - path: Resources/Assets.xcassets
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: Config
        buildPhase: none
    configFiles:
      Debug: Config/AppDebug.xcconfig
      Release: Config/AppRelease.xcconfig
    dependencies:
      - target: YingQiWidgetExtension
        embed: true
      - package: WechatOpenSDK
      - sdk: WebKit.framework
    settings:
      base:
        PRODUCT_NAME: YingQi
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Config/YingQi.entitlements
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Config/YingQi-Info.plist
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: $(YINGQI_PROFILE_NAME)
    preBuildScripts:
      - name: Fix WeChat SDK MinimumOSVersion
        script: |
          set -e
          MIN_OS="${IPHONEOS_DEPLOYMENT_TARGET:-17.0}"
          find "$HOME/Library/Developer/Xcode/DerivedData" \
            -path "*/SourcePackages/checkouts/WechatOpenSDK/Sources/WechatOpenSDK.xcframework/*/WechatOpenSDK.framework/Info.plist" \
            -print 2>/dev/null | while IFS= read -r plist; do
              chmod u+w "$plist" 2>/dev/null || true
              /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion ${MIN_OS}" "$plist" 2>/dev/null || \
              /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string ${MIN_OS}" "$plist"
            done
    postBuildScripts:
      - name: Fix Embedded WeChat SDK MinimumOSVersion
        script: |
          set -e
          MIN_OS="${IPHONEOS_DEPLOYMENT_TARGET:-17.0}"
          FRAMEWORK_PLIST="${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}/WechatOpenSDK.framework/Info.plist"
          FRAMEWORK_PATH="${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}/WechatOpenSDK.framework"
          if [ -f "$FRAMEWORK_PLIST" ]; then
            chmod u+w "$FRAMEWORK_PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion ${MIN_OS}" "$FRAMEWORK_PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string ${MIN_OS}" "$FRAMEWORK_PLIST"
            if [ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ] && [ -d "$FRAMEWORK_PATH" ]; then
              /usr/bin/codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" \
                --preserve-metadata=identifier,entitlements,flags \
                "$FRAMEWORK_PATH"
            fi
          fi
    scheme:
      testTargets:
        - YingQiTests
  YingQiWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Widgets
      - path: Support/BookingReminderActivityAttributes.swift
      - path: Support/AppThemePalette.swift
      - path: Support/AppThemeStyle.swift
    configFiles:
      Debug: Config/AppDebug.xcconfig
      Release: Config/AppRelease.xcconfig
    settings:
      base:
        PRODUCT_NAME: YingQiWidgetExtension
        PRODUCT_BUNDLE_IDENTIFIER: com.wanglida.YingQi.widget
        DEVELOPMENT_TEAM: 9ZV32GL37D
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Widgets/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: $(YINGQI_WIDGET_PROFILE_NAME)
  YingQiTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
      - path: Config
        buildPhase: none
    configFiles:
      Debug: Config/TestsDebug.xcconfig
      Release: Config/TestsRelease.xcconfig
    dependencies:
      - target: YingQi
    settings:
      base:
        PRODUCT_NAME: YingQiTests
        PRODUCT_MODULE_NAME: YingQiTests
        GENERATE_INFOPLIST_FILE: YES
