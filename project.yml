name: YingQi
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  YingQi:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Features
      - path: Models
      - path: Support
      - path: Resources/Assets.xcassets
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: Config
        buildPhase: none
    configFiles:
      Debug: Config/AppDebug.xcconfig
      Release: Config/AppRelease.xcconfig
    dependencies:
      - target: YingQiWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_NAME: YingQi
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Config/YingQi.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: 影期
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
    scheme:
      testTargets:
        - YingQiTests
  YingQiWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Widgets
      - path: Support/BookingReminderActivityAttributes.swift
      - path: Support/AppThemePalette.swift
      - path: Support/AppThemeStyle.swift
    settings:
      base:
        PRODUCT_NAME: YingQiWidgetExtension
        PRODUCT_BUNDLE_IDENTIFIER: com.wanglida.YingQi.widget
        DEVELOPMENT_TEAM: 9ZV32GL37D
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Widgets/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
  YingQiTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
      - path: Config
        buildPhase: none
    configFiles:
      Debug: Config/TestsDebug.xcconfig
      Release: Config/TestsRelease.xcconfig
    dependencies:
      - target: YingQi
    settings:
      base:
        PRODUCT_NAME: YingQiTests
        PRODUCT_MODULE_NAME: YingQiTests
        GENERATE_INFOPLIST_FILE: YES
