name: Check App Store Connect Build Status

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Build number to inspect"
        required: true
        default: "2026062801"

permissions:
  contents: read

jobs:
  check-build:
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - name: Query App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          BUILD_NUMBER: ${{ inputs.build_number }}
          BUNDLE_ID: com.wanglida.YingQi
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import json
          import os
          import subprocess
          import tempfile
          import time
          import urllib.parse
          import urllib.request

          def b64url(data):
              return base64.urlsafe_b64encode(data).rstrip(b"=").decode("ascii")

          def der_to_raw_ecdsa(der):
              if der[0] != 0x30:
                  raise ValueError("unexpected ECDSA signature")
              i = 2
              if der[1] & 0x80:
                  length_len = der[1] & 0x7F
                  i = 2 + length_len
              if der[i] != 0x02:
                  raise ValueError("missing r")
              r_len = der[i + 1]
              r = der[i + 2:i + 2 + r_len]
              i += 2 + r_len
              if der[i] != 0x02:
                  raise ValueError("missing s")
              s_len = der[i + 1]
              s = der[i + 2:i + 2 + s_len]
              return r.lstrip(b"\x00").rjust(32, b"\x00") + s.lstrip(b"\x00").rjust(32, b"\x00")

          key_id = os.environ["APP_STORE_CONNECT_API_KEY_ID"].strip()
          issuer_id = os.environ["APP_STORE_CONNECT_API_ISSUER_ID"].strip()
          pem = os.environ["APP_STORE_CONNECT_API_KEY_P8"].strip().replace("\\r", "")
          if "\\n" in pem:
              pem = pem.replace("\\n", "\n")

          now = int(time.time())
          header = {"alg": "ES256", "kid": key_id, "typ": "JWT"}
          payload = {"iss": issuer_id, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"}
          signing_input = f"{b64url(json.dumps(header, separators=(',', ':')).encode())}.{b64url(json.dumps(payload, separators=(',', ':')).encode())}"

          with tempfile.NamedTemporaryFile("w", delete=False) as key_file:
              key_file.write(pem.rstrip() + "\n")
              key_path = key_file.name
          try:
              proc = subprocess.run(
                  ["openssl", "dgst", "-sha256", "-sign", key_path],
                  input=signing_input.encode(),
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  check=True,
              )
          finally:
              os.unlink(key_path)
          token = signing_input + "." + b64url(der_to_raw_ecdsa(proc.stdout))

          def asc_get(path, params=None):
              url = "https://api.appstoreconnect.apple.com/v1/" + path
              if params:
                  url += "?" + urllib.parse.urlencode(params, doseq=True)
              req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          apps = asc_get("apps", {"filter[bundleId]": os.environ["BUNDLE_ID"]})
          if not apps.get("data"):
              raise SystemExit("App not found for bundle id " + os.environ["BUNDLE_ID"])
          app_id = apps["data"][0]["id"]
          print("APP_RESOURCE_ID=" + app_id)

          builds = asc_get("builds", {
              "filter[app]": app_id,
              "filter[version]": os.environ["BUILD_NUMBER"],
              "include": "preReleaseVersion",
              "sort": "-uploadedDate",
              "limit": "5",
          })
          data = builds.get("data", [])
          if not data:
              print("BUILD_NOT_FOUND=" + os.environ["BUILD_NUMBER"])
              raise SystemExit(0)

          included = {item["id"]: item for item in builds.get("included", [])}
          for build in data:
              attrs = build.get("attributes", {})
              pre_id = build.get("relationships", {}).get("preReleaseVersion", {}).get("data", {}).get("id")
              marketing = included.get(pre_id, {}).get("attributes", {}).get("version")
              print("BUILD_ID=" + build["id"])
              print("BUILD_NUMBER=" + str(attrs.get("version")))
              print("MARKETING_VERSION=" + str(marketing))
              print("PROCESSING_STATE=" + str(attrs.get("processingState")))
              print("BETA_REVIEW_STATE=" + str(attrs.get("betaReviewState")))
              print("UPLOADED_DATE=" + str(attrs.get("uploadedDate")))
              print("EXPIRED=" + str(attrs.get("expired")))
              groups = asc_get(f"builds/{build['id']}/betaGroups", {"limit": "20"}).get("data", [])
              print("BETA_GROUP_COUNT=" + str(len(groups)))
              if groups:
                  print("BETA_GROUPS=" + ", ".join(g.get("attributes", {}).get("name", g["id"]) for g in groups))
          PY
