name: Upload YingQi to TestFlight

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  upload-testflight:
    name: Archive and upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    env:
      ASC_KEY_PATH: ${{ github.workspace }}/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: WanglidaDan/YQ4.12
          ref: main
          fetch-depth: 1

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Configure App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$ASC_KEY_PATH")"
          printf '%s\n' "$APP_STORE_CONNECT_API_KEY_P8" > "$ASC_KEY_PATH"
          chmod 600 "$ASC_KEY_PATH"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project YingQi.xcodeproj \
            -scheme YingQi

      - name: Archive
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project YingQi.xcodeproj \
            -scheme YingQi \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/YingQi.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Export IPA
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/YingQi.xcarchive" \
            -exportPath "$PWD/build/export" \
            -exportOptionsPlist Config/TestFlightExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$PWD/build/export/YingQi.ipa" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: YingQi-TestFlight-IPA
          path: build/export/*.ipa
          if-no-files-found: ignore
